server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Basic gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Cache immutable assets (nomes com hash — seguros para cache longo)
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Service worker e arquivos de entrada do PWA: nunca cachear, sempre revalidar.
  # Garante que um novo deploy seja detectado imediatamente.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # SPA fallback — o shell (index.html) também não deve ser cacheado.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}

