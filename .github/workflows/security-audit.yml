# Falha o job se existir vulnerabilidade crítica (npm audit).
# Rode localmente: npm run audit
name: Security audit

on:
  push:
    branches: [main, dev, hml]
  pull_request:
    branches: [main, dev, hml]

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical)
        run: npm audit --audit-level=critical
