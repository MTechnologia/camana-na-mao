# Sync API Escola Aberta (ApiLib) + CEU horários/site SME → public_services
# Roda 1x por dia (7h UTC = 4h BRT), após o sync GeoSampa (6h UTC).
# Ordem: 1) Escola Aberta (escolas + CEUs), 2) Extras (tipos, ambientes), 3) CEU horários e "Sobre a unidade".
#
# Secrets obrigatórios: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, ESCOLA_ABERTA_API_TOKEN
# Secret opcional: GOOGLE_MAPS_API_KEY (para o script CEU inserir unidades novas com geocodificação)

name: Sync Escola Aberta + CEU

on:
  schedule:
    - cron: '0 7 * * *'   # Todo dia 7h UTC (4h BRT)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync Escola Aberta (escolas + CEUs)
        run: node scripts/sync-escolaaberta-public-services.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ESCOLA_ABERTA_API_TOKEN: ${{ secrets.ESCOLA_ABERTA_API_TOKEN }}

      - name: Sync Escola Aberta extras (tipos, ambientes)
        run: node scripts/sync-escolaaberta-extras.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ESCOLA_ABERTA_API_TOKEN: ${{ secrets.ESCOLA_ABERTA_API_TOKEN }}
          ESCOLA_ABERTA_DRE_CODES: ${{ secrets.ESCOLA_ABERTA_DRE_CODES || vars.ESCOLA_ABERTA_DRE_CODES || '' }}

      - name: Sync CEU horários e Sobre a unidade (site SME)
        run: node scripts/sync-ceu-opening-hours-sme.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
