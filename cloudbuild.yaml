steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/camara-na-mao:$COMMIT_SHA"
      - "--build-arg"
      - "CAMARA_URL=${_CAMARA_URL}"
      - "--build-arg"
      - "CAMARA_PUBLISHABLE_KEY=${_CAMARA_PUBLISHABLE_KEY}"
      - "--build-arg"
      - "CAMARA_PROJECT_ID=${_CAMARA_PROJECT_ID}"
      - "--build-arg"
      - "VITE_GOOGLE_MAPS_API_KEY=${_VITE_GOOGLE_MAPS_API_KEY}"
      - "."

  # Push image BEFORE deploying, otherwise Cloud Run can't find it yet.
  # Push image BEFORE deploying, otherwise Cloud Run can't find it yet.
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/camara-na-mao:$COMMIT_SHA"

  # Deploy to Cloud Run (required to replace the placeholder revision)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_CLOUD_RUN_SERVICE}"
      - "--image"
      - "gcr.io/$PROJECT_ID/camara-na-mao:$COMMIT_SHA"
      - "--region"
      - "${_CLOUD_RUN_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--quiet"
images:
  - "gcr.io/$PROJECT_ID/camara-na-mao:$COMMIT_SHA"

substitutions:
  _CAMARA_URL: ""
  _CAMARA_PUBLISHABLE_KEY: ""
  _CAMARA_PROJECT_ID: ""
  _VITE_GOOGLE_MAPS_API_KEY: ""
  _CLOUD_RUN_SERVICE: "camana-na-mao"
  _CLOUD_RUN_REGION: "southamerica-east1"

options:
  substitutionOption: "ALLOW_LOOSE"
  # Required when the trigger uses a custom build.service_account.
  # This avoids needing a logs bucket configuration.
  logging: "CLOUD_LOGGING_ONLY"

