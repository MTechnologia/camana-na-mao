# HU-7.1 / HU-8.6: nesta fase, o cron de 30 dias reaproveita a Edge Function `analyze-patterns`
# e a RPC `analyze_report_patterns` (janela deslizante de 30 dias em report_patterns).
# Não há job dedicado de `service_ratings` neste escopo atual. Para rodar com periodicidade
# (ex.: diário ou semanal), configure
# um job que chame a Edge Function `analyze-patterns`:
#
#   POST {SUPABASE_URL}/functions/v1/analyze-patterns
#   Headers: Authorization: Bearer {SERVICE_ROLE_KEY}
#            (se CRON_SECRET estiver definido no projeto) x-cron-secret: {CRON_SECRET}
#
# Opções: Supabase Dashboard → Integrations → Cron; ou pg_cron + pg_net + Vault conforme
# https://supabase.com/docs/guides/functions/schedule-functions
#
# Sugestão HU-8.6: agendamento semanal (ex.: domingo 04:00 UTC) ou diário em horário de baixo tráfego.
